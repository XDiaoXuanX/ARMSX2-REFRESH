name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipe Build'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Setup Node.js (jika diperlukan)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 5. Install dependencies
      - name: Install dependencies
        run: |
          npm install -g react-native-cli
          npm install

      # 6. Beri izin execute pada script
      - name: Make build script executable
        run: chmod +x ./tools/build-universal-page-apk.sh

      # 7. Build APK
      - name: Build Universal Page APK
        id: build
        run: |
          ./tools/build-universal-page-apk.sh ~/Downloads/ARMSX2-Refresh-UniversalPage.apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 8. Upload APK sebagai artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            app/build/outputs/apk/**/*.apk
            ~/Downloads/*.apk
          retention-days: 30
          if-no-files-found: error

      # 9. Upload ke release (optional)
      - name: Upload to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/**/*.apk
            ~/Downloads/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
